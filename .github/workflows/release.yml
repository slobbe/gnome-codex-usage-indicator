name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}" >&2
            exit 1
          fi

      - name: Validate metadata version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          METADATA_VERSION="$(sed -nE 's/^[[:space:]]*"version-name"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' metadata.json | head -n 1)"

          if [[ -z "${METADATA_VERSION}" ]]; then
            echo 'Unable to read version-name from metadata.json' >&2
            exit 1
          fi

          if [[ "${METADATA_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match metadata version-name ${METADATA_VERSION}" >&2
            exit 1
          fi

      - name: Install packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin zip

      - name: Build release bundle
        shell: bash
        run: ./build-release.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" dist/*.zip \
            --title "${RELEASE_VERSION}" \
            --generate-notes
